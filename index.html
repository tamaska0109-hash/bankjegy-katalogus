<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjtemény</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
  border-radius: 5px;
}

#addForm input, #addForm select {
  margin: 5px;
  padding: 8px;
  width: 200px;
}

#topList {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}
</style>

</head>

<body>

<h1>💰 Tamás Bankjegy Gyűjtemény</h1>

<div id="collectionValueBox">
  Összérték: <span id="totalValue">0</span> €
</div>

<input type="text" id="search" placeholder="Keresés">

<input type="text" id="search" placeholder="Keresés">

<div id="addForm">
  <h3>➕ Új bankjegy</h3>
  <input id="nameInput" placeholder="Név"><br>
  <input id="countryInput" placeholder="Ország"><br>
  <input id="yearInput" type="number" placeholder="Év"><br>

  <select id="conditionInput">
    <option value="UNC">UNC</option>
    <option value="XF">XF</option>
    <option value="VF">VF</option>
  </select><br>

  </div>

<div class="container"></div>

<h2>🏆 Top 10</h2>
<div id="topList"></div>

<script>

// ✅ STABIL BETÖLTÉS
let banknotes = JSON.parse(localStorage.getItem("banknotes")) || [
  {
    name: "100 Forint",
    country: "Hungary",
    year: 1990,
    condition: "UNC",
    baseValue: 5000,
    img: "https://via.placeholder.com/150"
  }
];

const container = document.querySelector(".container");

// 💰 ÉRTÉK
function calculateValue(note) {
  let multiplier = 1;

  if (note.condition === "UNC") multiplier = 3;
  else if (note.condition === "XF") multiplier = 2;
  else if (note.condition === "VF") multiplier = 1.5;

  return Math.round(note.baseValue * multiplier);
}

// 📊 RENDER
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${note.name}</h3>
      <img src="${note.img || 'https://via.placeholder.com/150'}">
      <p>${calculateValue(note)} €</p>
    `;

    container.appendChild(div);
  });

  updateTotal();
  renderChart();
  renderTopList();
}

// ➕ HOZZÁADÁS
function addBanknote() {
  const note = {
    name: document.getElementById("nameInput").value,
    country: document.getElementById("countryInput").value,
    year: parseInt(document.getElementById("yearInput").value),
    condition: document.getElementById("conditionInput").value,
    baseValue: parseFloat(document.getElementById("valueInput").value),
    img: document.getElementById("imgInput").value
  };

  banknotes.push(note);

  localStorage.setItem("banknotes", JSON.stringify(banknotes));

  renderBanknotes();
}

// 💰 ÖSSZÉRTÉK
function updateTotal() {
  let total = 0;
  banknotes.forEach(n => total += calculateValue(n));
  document.getElementById("totalValue").innerText = total;
}

// 📊 GRAFIKON
let chart;
function renderChart() {
  const totals = {};

  banknotes.forEach(n => {
    totals[n.country] = (totals[n.country] || 0) + calculateValue(n);
  });

  const ctx = document.getElementById("valueChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: Object.keys(totals),
      datasets: [{
        data: Object.values(totals)
      }]
    }
  });
}

// 🏆 TOP 10
function renderTopList() {
  const top = [...banknotes].sort(
    (a, b) => calculateValue(b) - calculateValue(a)
  ).slice(0, 10);

  const container = document.getElementById("topList");
  container.innerHTML = "";

  top.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h4>${note.name}</h4>
      <img src="${note.img || 'https://via.placeholder.com/150'}">
      <p>${calculateValue(note)} €</p>
    `;

    container.appendChild(div);
  });
}

// 🔍 KERESÉS
document.getElementById("search").addEventListener("keyup", function() {
  const value = this.value.toLowerCase();

  document.querySelectorAll(".card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(value)
      ? "block"
      : "none";
  });
});

// 🚀 INDÍTÁS
renderBanknotes();

</script>

</body>
</html>
:::
