<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjteménye</title>

  <style>

  padding: 20px;
  border-radius: 12px;
  width: 250px;
  margin: 0 auto 30px auto;

.add-box select {

.add-box button {

body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

  background: #222;
  padding: 15px;
  margin: 10px;

}

img {
  width: 100%;
}

/* ===== DESIGN UPGRADE ===== */

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: linear-gradient(145deg, #1a1a1a, #222);
  padding: 15px;
  width: 220px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px gold;
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin: 5px 0;
  font-size: 18px;
}

.card p {
  margin: 3px 0;
  font-size: 14px;
  color: #ccc;
}

.card button {
  margin-top: 10px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: crimson;
  color: white;
  cursor: pointer;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}

    #map {
  margin-bottom: 20px;
  border-radius: 10px;
  height: 600px;
  position: relative; /* 🔥 EZ FONTOS */
}


.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;

  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  padding: 12px;
  border-radius: 12px;

  font-size: 14px;
  color: white;

  border: 1px solid rgba(255, 255, 255, 0.2);

  box-shadow: 0 8px 20px rgba(0,0,0,0.4);

  z-index: 1000;
}

.legend div {
  display: flex;
  align-items: center;
  margin: 5px 0;
}

.legend span {
  display: inline-block;
  width: 25px;
  height: 12px;
  margin-right: 10px;
  border-radius: 4px;
}

.legend:hover {
  transform: scale(1.05);
  transition: 0.2s;
}   

#stats {
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
  background: #1a1a1a;
  padding: 5px 10px;
  border-radius: 5px;
}    
    
</style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
  </head>

  <body>

   <h1>💰 Tamás Bankjegy Gyűjteménye</h1>
   <div class="top-bar">
  <button onclick="adminLogin()">🔐 Admin belépés</button>
  <button onclick="logout()">🚪 Kilépés</button>
</div>
    
    <h2 id="totalValue">Összérték: 0 €</h2>

    <h2>🌍 Gyűjtemény térkép</h2>
<div id="map">

  <div class="legend">
    <div><span style="background:white"></span> 0 db</div>
    <div><span style="background:#a8e6cf"></span> 1–5 db</div>
    <div><span style="background:#56c596"></span> 6–20 db</div>
    <div><span style="background:#2e8b57"></span> 20+ db</div>
  </div>

</div>
    
    <h2>📊 Statisztika</h2>
<div id="stats"></div>
    
   <div class="top-bar">
  <input id="filterCountry" placeholder="Ország">
  <input id="filterYear" placeholder="Év">
  <input id="filterCatalog" placeholder="Katalógusszám">  
  <button onclick="applyFilter()">Szűrés</button>
  <button onclick="resetFilter()">Reset</button>
</div>

  <div class="add-box" id="addBox">
    
  <h2>➕ Új bankjegy</h2>

  <input id="nameInput" placeholder="Név">
  <input id="countryInput" placeholder="Ország">
  <input id="yearInput" placeholder="Év">
  <input id="catalogInput" placeholder="Katalógusszám (pl. P-123)">
  <select id="conditionInput">
    <option value="UNC">UNC</option>
    <option value="AU">AU</option>
    <option value="XF">XF</option>
    <option value="VF">VF</option>
  </select>
  <input id="valueInput" placeholder="Érték (€)">
  <button onclick="estimateValue()">🤖 AI becslés</button>  
  <input id="purchaseInput" placeholder="Beszerzési ár (€)">  
  <input id="imgInput" placeholder="Kép link">

  <button onclick="addBanknote()">Hozzáadás</button>
</div>

  <div class="container"></div>

   <script type="module">

let isAdmin = false;
let worldData = null;
let map;
let banknotes = [];
let allBanknotes = [];

// ADMIN STATE
if (localStorage.getItem("isAdmin") === "true") {
  isAdmin = true;
}

// NORMALIZE
function normalizeCountry(name) {
  if (!name) return "";
  return name.toLowerCase().trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDupwhLiT13blp-UtOCy4A57337sQQuHLw",
  authDomain: "bankjegy-2c60b.firebaseapp.com",
  projectId: "bankjegy-2c60b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.querySelector(".container");

// MAP LOAD
async function loadWorldMap() {
  const res = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
  worldData = await res.json();
}

// MAP INIT
function initMap() {
  map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

// RENDER
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${note.img || 'https://via.placeholder.com/150'}">
      <h3>${note.name || ""}</h3>
      <p>${note.country || ""} • ${note.year || ""}</p>
      <p>Katalógus: ${note.catalog || "-"}</p>

      ${isAdmin ? `<p>💰 ${note.value || 0} €</p>` : ""}
      ${isAdmin ? `<p>Beszerzés: ${note.purchase || 0} €</p>` : ""}

      <p>Állapot: ${note.condition || "-"}</p>

      ${isAdmin ? `<button onclick="deleteNote('${note.id}')">Törlés</button>` : ""}
    `;

    container.appendChild(div);
  });

  document.getElementById("addBox").style.display = isAdmin ? "block" : "none";

  updateMap();
  updateStats();
  updateTotal();
}

// ADD
window.addBanknote = async function () {
  const note = {
    name: nameInput.value,
    country: countryInput.value,
    year: parseInt(yearInput.value),
    catalog: catalogInput.value,
    condition: conditionInput.value,
    value: parseFloat(valueInput.value),
    purchase: parseFloat(purchaseInput.value),
    img: imgInput.value
  };

  await addDoc(collection(db, "banknotes"), note);
  loadBanknotes();
};

// DELETE
window.deleteNote = async function (id) {
  if (!confirm("Biztos törlés?")) return;
  await deleteDoc(doc(db, "banknotes", id));
  loadBanknotes();
};

// LOAD
async function loadBanknotes() {
  const snap = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  snap.forEach(docu => {
    const data = { id: docu.id, ...docu.data() };
    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}

// MAP UPDATE
function updateMap() {
  if (!map || !worldData) return;

  map.eachLayer(layer => {
    if (layer.feature) map.removeLayer(layer);
  });

  const countryCount = {};

  banknotes.forEach(note => {
    const c = normalizeCountry(note.country);
    countryCount[c] = (countryCount[c] || 0) + 1;
  });

  L.geoJSON(worldData, {
    style: function(feature) {

      const name = normalizeCountry(feature.properties.name);
      const count = countryCount[name] || 0;

      let fillColor = "transparent";

      if (count > 0 && count <= 5) fillColor = "#fff3bf";
      else if (count > 5 && count <= 20) fillColor = "#ffd43b";
      else if (count > 20) fillColor = "#fab005";

      return {
        color: "#cc3333",
        weight: 1,
        fillColor: fillColor,
        fillOpacity: count > 0 ? 0.7 : 0
      };
    },

    onEachFeature: function(feature, layer) {

      const name = normalizeCountry(feature.properties.name);
      const count = countryCount[name] || 0;

      if (count > 0) {
        layer.bindPopup(`${feature.properties.name}: ${count} db`);
      }

      layer.on({
        mouseover: e => e.target.setStyle({ weight: 3, color: "#ff4444" }),
        mouseout: e => e.target.setStyle({ weight: 1, color: "#cc3333" })
      });

      layer.on('click', function() {
        banknotes = allBanknotes.filter(note =>
          normalizeCountry(note.country) === name
        );
        renderBanknotes();
      });
    }
  }).addTo(map);
}

// STATS
function updateStats() {
  const statsDiv = document.getElementById("stats");
  const counts = {};

  banknotes.forEach(note => {
    const c = normalizeCountry(note.country);
    counts[c] = (counts[c] || 0) + 1;
  });

  statsDiv.innerHTML = "";

  Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,10)
    .forEach(([country, count]) => {

      const div = document.createElement("div");
      div.className = "stat-row";

      div.innerHTML = `<span>${country}</span><span>${count} db</span>`;

      div.onclick = () => {
        banknotes = allBanknotes.filter(n =>
          normalizeCountry(n.country) === country
        );
        renderBanknotes();
      };

      statsDiv.appendChild(div);
    });
}

// TOTAL
function updateTotal() {
  if (!isAdmin) {
    document.getElementById("totalValue").innerText = "Összérték: 🔒";
    return;
  }

  let total = 0;
  banknotes.forEach(n => total += Number(n.value) || 0);

  document.getElementById("totalValue").innerText = "Összérték: " + total + " €";
}

// FILTER
window.applyFilter = function () {
  const country = normalizeCountry(document.getElementById("filterCountry").value);
  const year = document.getElementById("filterYear").value;
  const catalog = document.getElementById("filterCatalog").value.toLowerCase();

  banknotes = allBanknotes.filter(note => {

    const noteCountry = normalizeCountry(note.country);

    return (
      (!country || noteCountry.includes(country)) &&
      (!year || note.year == year) &&
      (!catalog || (note.catalog && note.catalog.toLowerCase().includes(catalog)))
    );
  });

  renderBanknotes();
};

// RESET
window.resetFilter = function () {
  banknotes = [...allBanknotes];
  renderBanknotes();
};
     
// ADMIN
window.adminLogin = function() {
  const password = prompt("Jelszó:");

  if (password === "1234") {
    isAdmin = true;
    localStorage.setItem("isAdmin", "true");
    renderBanknotes();
  }
};

window.logout = function() {
  isAdmin = false;
  localStorage.removeItem("isAdmin");
  renderBanknotes();
};

// INIT
await loadWorldMap();
initMap();
loadBanknotes();

</script>


 </body>
</html>
