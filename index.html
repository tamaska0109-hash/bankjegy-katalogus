  <style>

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.top-bar input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.top-bar button {
  padding: 8px 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.add-box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  margin: 0 auto 30px auto;
}

.add-box input,
.add-box select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.add-box button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;
}
    
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
}

/* ===== DESIGN UPGRADE ===== */

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: linear-gradient(145deg, #1a1a1a, #222);
  padding: 15px;
  width: 220px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px gold;
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin: 5px 0;
  font-size: 18px;
}

.card p {
  margin: 3px 0;
  font-size: 14px;
  color: #ccc;
}

.card button {
  margin-top: 10px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: crimson;
  color: white;
  cursor: pointer;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}

    #map {
  margin-bottom: 20px;
  border-radius: 10px;
  height: 600px;
  position: relative; /* 🔥 EZ FONTOS */
}


.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;

  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  padding: 12px;
  border-radius: 12px;

  font-size: 14px;
  color: white;

  border: 1px solid rgba(255, 255, 255, 0.2);

  box-shadow: 0 8px 20px rgba(0,0,0,0.4);

  z-index: 1000;
}

.legend div {
  display: flex;
  align-items: center;
  margin: 5px 0;
}

.legend span {
  display: inline-block;
  width: 25px;
  height: 12px;
  margin-right: 10px;
  border-radius: 4px;
}

.legend:hover {
  transform: scale(1.05);
  transition: 0.2s;
}   

#stats {
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
  background: #1a1a1a;
  padding: 5px 10px;
  border-radius: 5px;
}    

.stat-row {
  cursor: pointer;
  transition: 0.2s;
}

.stat-row:hover {
  transform: scale(1.05);
  background: rgba(255, 215, 0, 0.1);
  box-shadow: 0 0 10px gold;
}

.active-continent {
  background: gold !important;
  color: black;
  font-weight: bold;
}

.active-country {
  background: #ff4d4d;
  color: white;
  font-weight: bold;
}
    
 @keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.stat-row.clicked {
  animation: pulse 0.3s ease;
}  

 .legend div {
  cursor: pointer;
  transition: 0.2s;
}

.legend div:hover {
  transform: scale(1.05);
  background: rgba(255, 0, 0, 0.15); /* halvány piros */
}

.active-legend {
  background: #ff4d4d !important; /* erős piros */
  color: white;
  font-weight: bold;
}   
    
</style>

  <body>

<script type="module">

let isAdmin = false;
let worldData = null;
let map;
let banknotes = [];
let allBanknotes = [];
let countryToISO = {};  

let activeContinent = null;
let activeCountry = null;
let statsMode = "continent";

// ADMIN
if (localStorage.getItem("isAdmin") === "true") {
  isAdmin = true;
}

// NORMALIZE
function normalizeCountry(name) {
  if (!name) return "";
  return name.toLowerCase().trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// TO ENGLISH
function normalizeToEnglish(name) {
  const map = {
    "magyarorszag":"hungary",
    "nemetorszag":"germany",
    "ausztria":"austria",
    "kina":"china",
    "usa":"united states of america",
    "egyesult allamok":"united states of america"
  };
  return map[normalizeCountry(name)] || normalizeCountry(name);
}
// ISO MAP
function buildCountryISOMap() {
  worldData.features.forEach(f => {
    const name = normalizeToEnglish(f.properties.name);
    countryToISO[name] = f.id.toLowerCase();
  });
}  

// 🌍 FULL CONTINENT MAP (EZ VOLT A HIÁNYZÓ!)
window.continentMap = {

  // EUROPE
  "albania":"Europe","andorra":"Europe","austria":"Europe","belarus":"Europe",
  "belgium":"Europe","bosnia and herzegovina":"Europe","bulgaria":"Europe",
  "croatia":"Europe","cyprus":"Europe","czechia":"Europe","denmark":"Europe",
  "estonia":"Europe","finland":"Europe","france":"Europe","germany":"Europe",
  "greece":"Europe","hungary":"Europe","iceland":"Europe","ireland":"Europe",
  "italy":"Europe","kosovo":"Europe","latvia":"Europe","liechtenstein":"Europe",
  "lithuania":"Europe","luxembourg":"Europe","malta":"Europe","moldova":"Europe",
  "monaco":"Europe","montenegro":"Europe","netherlands":"Europe","north macedonia":"Europe",
  "norway":"Europe","poland":"Europe","portugal":"Europe","romania":"Europe",
  "san marino":"Europe","serbia":"Europe","slovakia":"Europe","slovenia":"Europe",
  "spain":"Europe","sweden":"Europe","switzerland":"Europe","ukraine":"Europe",
  "united kingdom":"Europe","vatican":"Europe",

  // ASIA
  "afghanistan":"Asia","armenia":"Asia","azerbaijan":"Asia","bahrain":"Asia",
  "bangladesh":"Asia","bhutan":"Asia","brunei":"Asia","cambodia":"Asia",
  "china":"Asia","georgia":"Asia","india":"Asia","indonesia":"Asia",
  "iran":"Asia","iraq":"Asia","israel":"Asia","japan":"Asia","jordan":"Asia",
  "kazakhstan":"Asia","kuwait":"Asia","kyrgyzstan":"Asia","laos":"Asia",
  "lebanon":"Asia","malaysia":"Asia","maldives":"Asia","mongolia":"Asia",
  "myanmar":"Asia","nepal":"Asia","north korea":"Asia","oman":"Asia",
  "pakistan":"Asia","philippines":"Asia","qatar":"Asia","saudi arabia":"Asia",
  "singapore":"Asia","south korea":"Asia","sri lanka":"Asia","syria":"Asia",
  "tajikistan":"Asia","thailand":"Asia","turkmenistan":"Asia",
  "united arab emirates":"Asia","uzbekistan":"Asia",
  "vietnam":"Asia","yemen":"Asia","turkey":"Asia",

  // AMERICA
  "argentina":"America","bahamas":"America","barbados":"America","belize":"America",
  "bolivia":"America","brazil":"America","canada":"America","chile":"America",
  "colombia":"America","costa rica":"America","cuba":"America",
  "dominican republic":"America","ecuador":"America","guatemala":"America",
  "guyana":"America","haiti":"America","honduras":"America","jamaica":"America",
  "mexico":"America","nicaragua":"America","panama":"America","paraguay":"America",
  "peru":"America","suriname":"America","trinidad and tobago":"America",
  "united states":"America","united states of america":"America",
  "uruguay":"America","venezuela":"America",

  // AFRICA
  "algeria":"Africa","angola":"Africa","benin":"Africa","botswana":"Africa",
  "burkina faso":"Africa","burundi":"Africa","cameroon":"Africa",
  "central african republic":"Africa","chad":"Africa","congo":"Africa",
  "democratic republic of the congo":"Africa","egypt":"Africa",
  "ethiopia":"Africa","ghana":"Africa","kenya":"Africa","libya":"Africa",
  "madagascar":"Africa","malawi":"Africa","mali":"Africa","morocco":"Africa",
  "mozambique":"Africa","namibia":"Africa","niger":"Africa","nigeria":"Africa",
  "rwanda":"Africa","senegal":"Africa","somalia":"Africa",
  "south africa":"Africa","sudan":"Africa","tanzania":"Africa",
  "tunisia":"Africa","uganda":"Africa","zambia":"Africa","zimbabwe":"Africa",

  // OCEANIA
  "australia":"Oceania","fiji":"Oceania","kiribati":"Oceania",
  "marshall islands":"Oceania","micronesia":"Oceania","nauru":"Oceania",
  "new zealand":"Oceania","palau":"Oceania","papua new guinea":"Oceania",
  "samoa":"Oceania","solomon islands":"Oceania","tonga":"Oceania",
  "tuvalu":"Oceania","vanuatu":"Oceania"
};

// FLAG
function getFlagCode(name) {
  const n = normalizeToEnglish(name);
  return countryToISO[n] || "xx";
}

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDupwhLiT13blp-UtOCy4A57337sQQuHLw",
  authDomain: "bankjegy-2c60b.firebaseapp.com",
  projectId: "bankjegy-2c60b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.querySelector(".container");

// MAP LOAD
async function loadWorldMap() {
  const res = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
  worldData = await res.json();
}

// MAP INIT
function initMap() {
  map = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// RENDER
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${note.img || ''}">
      <h3>${note.name || ""}</h3>
      <p>${note.country || ""}</p>
    `;

    container.appendChild(div);
  });

  updateMap();
  updateStats();
}

// MAP
function updateMap() {
  if (!map || !worldData) return;

  // 🔥 régi layer-ek törlése
  map.eachLayer(layer => {
    if (layer.feature) map.removeLayer(layer);
  });

  const countryCount = {};

  // 🔥 ország darabszám
  banknotes.forEach(note => {
    if (!note.country) return;

    const c = normalizeToEnglish(note.country);
    countryCount[c] = (countryCount[c] || 0) + 1;
  });

  L.geoJSON(worldData, {

    // 🔥 SZÍNEZÉS
    style: function(feature) {

      const name = normalizeToEnglish(feature.properties.name);
      const count = countryCount[name] || 0;

      let fillColor = "transparent";

      if (count > 0 && count <= 5) fillColor = "#fff3b0";
      else if (count > 5 && count <= 20) fillColor = "#ffa94d";
      else if (count > 20) fillColor = "#ff8c00";

      return {
        color: "#cc3333",
        weight: 1,
        fillColor: fillColor,
        fillOpacity: count > 0 ? 0.8 : 0
      };
    },

    // 🔥 INTERAKCIÓ
    onEachFeature: function(feature, layer) {

      const name = normalizeToEnglish(feature.properties.name);
      const count = countryCount[name] || 0;

      if (count > 0) {
        layer.bindPopup(`${feature.properties.name}: ${count} db`);
      }

      layer.on({
        mouseover: e => e.target.setStyle({ weight: 3, color: "#ff4444" }),
        mouseout: e => e.target.setStyle({ weight: 1, color: "#cc3333" })
      });

      // 🔥 KATTINTÁS
      layer.on('click', function() {

        statsMode = "country";
        activeCountry = null;
        activeContinent = null;

        const mapName = normalizeToEnglish(feature.properties.name);

        banknotes = allBanknotes.filter(note => {
          if (!note.country) return false;

          const c = normalizeToEnglish(note.country);
          return c === mapName;
        });

        renderBanknotes();
      });
    }

  }).addTo(map);
}

// STATS
function updateStats() {

  const statsDiv = document.getElementById("stats");
  statsDiv.innerHTML = "";

  const iconMap = {
    "Europe": "🌍 Európa",
    "Asia": "🌏 Ázsia",
    "America": "🌎 Amerika",
    "Africa": "🌍 Afrika",
    "Oceania": "🌏 Óceánia",
    "Other": "❓ Egyéb"
  };

  // 🌍 FULL MAP
  const continentMap = {
    "hungary":"Europe","magyarorszag":"Europe",
    "germany":"Europe","nemetorszag":"Europe",
    "austria":"Europe","ausztria":"Europe",
    "france":"Europe","spain":"Europe","italy":"Europe","portugal":"Europe",
    "netherlands":"Europe","hollandia":"Europe",
    "belgium":"Europe","luxembourg":"Europe",
    "poland":"Europe","lengyelorszag":"Europe",
    "czechia":"Europe","csehorszag":"Europe",
    "slovakia":"Europe","szlovakia":"Europe",
    "romania":"Europe","bulgaria":"Europe",
    "croatia":"Europe","horvatorszag":"Europe",
    "serbia":"Europe","slovenia":"Europe",
    "bosnia":"Europe","montenegro":"Europe",
    "albania":"Europe","north macedonia":"Europe",
    "greece":"Europe","gorogorszag":"Europe",
    "turkey":"Europe","torokorszag":"Europe",
    "ukraine":"Europe","belarus":"Europe",
    "lithuania":"Europe","latvia":"Europe","estonia":"Europe",
    "norway":"Europe","sweden":"Europe","finland":"Europe","denmark":"Europe",
    "ireland":"Europe","iceland":"Europe",
    "united kingdom":"Europe","uk":"Europe",
    "switzerland":"Europe",

    "china":"Asia","kina":"Asia",
    "japan":"Asia","india":"Asia","pakistan":"Asia",
    "indonesia":"Asia","thailand":"Asia","vietnam":"Asia",

    "usa":"America","united states":"America","united states of america":"America",
    "canada":"America","mexico":"America",
    "brazil":"America","argentina":"America",

    "egypt":"Africa","egyiptom":"Africa",
    "south africa":"Africa","nigeria":"Africa",

    "australia":"Oceania","new zealand":"Oceania"
  };

  const countryHu = {
    "hungary":"Magyarország",
    "germany":"Németország",
    "austria":"Ausztria",
    "france":"Franciaország",
    "spain":"Spanyolország",
    "italy":"Olaszország",
    "china":"Kína",
    "japan":"Japán",
    "india":"India",
    "united states of america":"USA",
    "brazil":"Brazília",
    "argentina":"Argentína",
    "egypt":"Egyiptom",
    "south africa":"Dél-Afrika",
    "australia":"Ausztrália"
  };

  // 🌍 CONTINENT
  if (statsMode === "continent") {

    const counts = {};

    allBanknotes.forEach(note => {
      const c = normalizeToEnglish(note.country);
      const cont = continentMap[c] || "Other";
      counts[cont] = (counts[cont] || 0) + 1;
    });

    Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([continent, count]) => {

        const div = document.createElement("div");
        div.className = "stat-row";

        div.innerHTML = `
          <span>${iconMap[continent]}</span>
          <span>${count} db</span>
        `;

        div.onclick = () => {
          activeContinent = continent;
          statsMode = "continent-drill";

          banknotes = allBanknotes.filter(n =>
            (continentMap[normalizeToEnglish(n.country)] || "Other") === continent
          );

          renderBanknotes();
        };

        statsDiv.appendChild(div);
      });
  }

  // 🌎 CONTINENT → COUNTRY
  else if (statsMode === "continent-drill") {

    const counts = {};

    allBanknotes.forEach(note => {
      const c = normalizeToEnglish(note.country);
      const cont = continentMap[c] || "Other";

      if (cont !== activeContinent) return;

      counts[c] = (counts[c] || 0) + 1;
    });

    // 🔙 vissza
    const back = document.createElement("div");
    back.className = "stat-row";
    back.innerHTML = "⬅️ Vissza";

    back.onclick = () => {
      statsMode = "continent";
      activeContinent = null;
      banknotes = [...allBanknotes];
      activeCountry = null;
      renderBanknotes();
    };

    statsDiv.appendChild(back);

    Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([country, count]) => {

        const name = countryHu[country] || country;

        const div = document.createElement("div");
        div.className = "stat-row";

        if (country === activeCountry) {
          div.classList.add("active-country");
        }

        div.innerHTML = `
          <span>
            <img src="https://flagcdn.com/24x18/${getFlagCode(country)}.png"
            style="width:24px; margin-right:6px;">
            ${name}
          </span>
          <span>${count} db</span>
        `;

        div.onclick = () => {

          // 🔥 TOGGLE FIX
          if (activeCountry === country) {
            activeCountry = null;

            // vissza kontinensre
            banknotes = allBanknotes.filter(n =>
              (continentMap[normalizeToEnglish(n.country)] || "Other") === activeContinent
            );

          } else {
            activeCountry = country;

            banknotes = allBanknotes.filter(n =>
              normalizeToEnglish(n.country) === country
            );
          }

          renderBanknotes();
        };

        statsDiv.appendChild(div);
      });
  }

  // 🌎 COUNTRY MODE (csak kijelzett állapot)
  else {
    // ezt nem használjuk aktívan már
  }
}

// LOAD
async function loadBanknotes() {
  const snap = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  snap.forEach(docu => {
    const data = { id: docu.id, ...docu.data() };
    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}

// INIT
await loadWorldMap();
buildCountryISOMap ();  
initMap();
loadBanknotes();

</script>
