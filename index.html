.container {

.legend {

 // COUNTRYCODE    
 function getCountryCode(name) {
  const map = {
    "hungary": "hu",

    "italy": "it",
    "spain": "es",

    "argentina": "ar",
    "australia": "au",

  };

  const normalized = normalizeCountry(name);
  return map[normalized] || "";
}

     
// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDupwhLiT13blp-UtOCy4A57337sQQuHLw",
  authDomain: "bankjegy-2c60b.firebaseapp.com",
  projectId: "bankjegy-2c60b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.querySelector(".container");

// MAP LOAD
async function loadWorldMap() {
  const res = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
  worldData = await res.json();
}

// MAP INIT
function initMap() {
  map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

// RENDER
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${note.img || 'https://via.placeholder.com/150'}">
      <h3>${note.name || ""}</h3>
      <p style="text-align:center;">
 <img 
  src="https://flagcdn.com/24x18/${getFlagCode(note.country)}.png"
  style="width:28px; display:block; margin:0 auto 5px auto; border-radius:3px;"
 >

    ${note.country || ""}
  </span>
</p>

<p style="margin-top:5px;">
  ${note.year || ""}
</p>

      <p>Állapot: ${note.condition || "-"}</p>

      ${isAdmin ? `<button onclick="deleteNote('${note.id}')">Törlés</button>` : ""}
    `;

    container.appendChild(div);
  });

  document.getElementById("addBox").style.display = isAdmin ? "block" : "none";

  updateMap();
  updateStats();
  updateTotal();
}

// ADD
window.addBanknote = async function () {
  const note = {
    name: nameInput.value,
    country: countryInput.value,
    year: parseInt(yearInput.value),
    catalog: catalogInput.value,
    condition: conditionInput.value,
    value: parseFloat(valueInput.value),
    purchase: parseFloat(purchaseInput.value),
    img: imgInput.value
  };

  await addDoc(collection(db, "banknotes"), note);
  loadBanknotes();
};

// DELETE
window.deleteNote = async function (id) {
  if (!confirm("Biztos törlés?")) return;
  await deleteDoc(doc(db, "banknotes", id));
  loadBanknotes();
};

// LOAD
async function loadBanknotes() {
  const snap = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  snap.forEach(docu => {
    const data = { id: docu.id, ...docu.data() };
    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}

// MAP UPDATE
function updateMap() {
  if (!map || !worldData) return;

  map.eachLayer(layer => {
    if (layer.feature) map.removeLayer(layer);
  });

  const countryCount = {};

  banknotes.forEach(note => {
    const c = normalizeCountry(note.country);
    countryCount[c] = (countryCount[c] || 0) + 1;
  });

  L.geoJSON(worldData, {
    style: function(feature) {

      const name = normalizeCountry(feature.properties.name);
      const count = countryCount[name] || 0;

      let fillColor = "transparent";

      if (count > 0 && count <= 5) fillColor = "#fff3bf";
      else if (count > 5 && count <= 20) fillColor = "#ffd43b";
      else if (count > 20) fillColor = "#fab005";

      return {
        color: "#cc3333",
        weight: 1,
        fillColor: fillColor,
        fillOpacity: count > 0 ? 0.7 : 0
      };
    },

    onEachFeature: function(feature, layer) {

      const name = normalizeCountry(feature.properties.name);
      const count = countryCount[name] || 0;

      if (count > 0) {
        layer.bindPopup(`${feature.properties.name}: ${count} db`);
      }

      layer.on({
        mouseover: e => e.target.setStyle({ weight: 3, color: "#ff4444" }),
        mouseout: e => e.target.setStyle({ weight: 1, color: "#cc3333" })
      });

      layer.on('click', function() {

  const mapName = normalizeCountry(feature.properties.name);

  const countryMap = {
    "magyarorszag": "hungary",
    "nemetorszag": "germany",
    "ausztria": "austria",
    "olaszorszag": "italy",
    "spanyolorszag": "spain",
    "franciaorszag": "france",
    "hollandia": "netherlands",
    "lengyelorszag": "poland",
    "csehorszag": "czechia",
    "szlovakia": "slovakia",
    "romania": "romania",
    "horvatorszag": "croatia",
    "szerbia": "serbia",
    "kina": "china",
    "japan": "japan",
    "usa": "united states of america",
    "egyesult allamok": "united states of america",
    "egyiptom": "egypt",
    "torokorszag": "turkey",
    "gorogorszag": "greece"
  };

  banknotes = allBanknotes.filter(note => {
    if (!note.country) return false;

    let noteCountry = normalizeCountry(note.country);

    noteCountry = countryMap[noteCountry] || noteCountry;

    return noteCountry === mapName;
  });

  renderBanknotes();
});
    }
  }).addTo(map);
}

// STATS
function updateStats() {
  const statsDiv = document.getElementById("stats");
  const counts = {};

  banknotes.forEach(note => {
    const c = normalizeCountry(note.country);
    counts[c] = (counts[c] || 0) + 1;
  });

  statsDiv.innerHTML = "";

  Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,10)
    .forEach(([country, count]) => {

      const div = document.createElement("div");
      div.className = "stat-row";

      div.innerHTML = `<span>${country}</span><span>${count} db</span>`;

      div.onclick = () => {
        banknotes = allBanknotes.filter(n =>
          normalizeCountry(n.country) === country
        );
        renderBanknotes();
      };

      statsDiv.appendChild(div);
    });
}

// TOTAL
function updateTotal() {
  if (!isAdmin) {
    document.getElementById("totalValue").innerText = "Összérték: 🔒";
    return;
  }

  let total = 0;
  banknotes.forEach(n => total += Number(n.value) || 0);

  document.getElementById("totalValue").innerText = "Összérték: " + total + " €";
}

// FILTER
window.applyFilter = function () {
  const country = normalizeCountry(document.getElementById("filterCountry").value);
  const year = document.getElementById("filterYear").value;
  const catalog = document.getElementById("filterCatalog").value.toLowerCase();

  banknotes = allBanknotes.filter(note => {

    const noteCountry = normalizeCountry(note.country);

    return (
      (!country || noteCountry.includes(country)) &&
      (!year || note.year == year) &&
      (!catalog || (note.catalog && note.catalog.toLowerCase().includes(catalog)))
    );
  });

  renderBanknotes();
};

// RESET
window.resetFilter = function () {
  banknotes = [...allBanknotes];
  renderBanknotes();
};
     
// ADMIN
window.adminLogin = function() {
  const password = prompt("Jelszó:");

  if (password === "1234") {
    isAdmin = true;
    localStorage.setItem("isAdmin", "true");
    renderBanknotes();
  }
};

window.logout = function() {
  isAdmin = false;
  localStorage.removeItem("isAdmin");
  renderBanknotes();
};

// INIT
await loadWorldMap();
initMap();
loadBanknotes();

</script>
