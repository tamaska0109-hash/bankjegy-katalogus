<style>

/* ===== ALAP ===== */

body {
  font-family: Arial;
  background: #f5f5f5;
  color: #111;
  text-align: center;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}

/* ===== TOP BAR ===== */

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.top-bar input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.top-bar button {
  padding: 8px 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

/* ===== ADD BOX ===== */

.add-box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  margin: 0 auto 30px auto;
}

.add-box input,
.add-box select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.add-box button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;
}

/* ===== CONTAINER ===== */

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* ===== CARD ===== */

.card {
  width: 220px;
  height: 320px;
  perspective: 1000px;
  margin: 10px;
}

/* ✨ lebegő animáció */
.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s, box-shadow 0.3s;
  transform-style: preserve-3d;

  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.12);
}

/* ✨ prémium hover */
.card:hover .card-inner {
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* scale csak ha nem flipped */
.card:not(.flipped):hover .card-inner {
  transform: translateY(-5px) scale(1.03);
}

/* flip */
.card.flipped .card-inner {
  transform: rotateY(180deg);
}

/* front/back */

.card-front,
.card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;

  border-radius: 15px;
  padding: 15px;

  background: white;
  color: #111;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.card-back {
  transform: rotateY(180deg);
}

/* ===== KÉPEK ===== */

.card img:not(.flag) {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* ===== SZÖVEG ===== */

.card h3 {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}

.country {
  font-size: 14px;
  color: #666;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 4px;
}

.year {
  font-size: 13px;
  color: #999;
  margin-bottom: 4px;
}

/* ===== FLAG ===== */

.card .country img.flag {
  width: 18px;
  height: auto;
  border-radius: 0;
}

/* ===== BADGE ===== */

.badge {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: bold;
  margin-top: 6px;
}

/* állapot színek */
.badge-UNC { background: #2ecc71; color: white; }
.badge-AU  { background: #27ae60; color: white; }
.badge-XF  { background: #3498db; color: white; }
.badge-VF  { background: #2980b9; color: white; }
.badge-F   { background: #f39c12; color: white; }
.badge-VG  { background: #e67e22; color: white; }
.badge-G   { background: #e74c3c; color: white; }

/* ===== CATALOG ===== */

.catalog {
  font-family: monospace;
  font-size: 13px;
  background: #e9ecef;
  padding: 5px 10px;
  border-radius: 8px;
  margin: 6px 0;
  display: inline-block;
  font-weight: bold;
  letter-spacing: 1px;
}

/* ===== GOMB ===== */

.card button {
  margin-top: 10px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: crimson;
  color: white;
  cursor: pointer;
}

/* ===== MAP ===== */

#map {
  margin-bottom: 20px;
  border-radius: 10px;
  height: 600px;
  position: relative;
}

/* ===== LEGEND ===== */

.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.7);
  padding: 12px;
  border-radius: 12px;
  color: white;
}

.legend div {
  display: flex;
  align-items: center;
  margin: 5px 0;
  cursor: pointer;
}

.legend span {
  width: 25px;
  height: 12px;
  margin-right: 10px;
  border-radius: 4px;
}

/* ===== STATS ===== */

#stats {
  max-width: 400px;
  margin: 20px auto;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
  background: #1a1a1a;
  padding: 5px 10px;
  border-radius: 5px;
  color: white;
}

.stat-row:hover {
  transform: scale(1.05);
}

// MAP
function updateMap() {
  if (!map || !worldData) return;

  // 🔥 régi layer-ek törlése
  map.eachLayer(layer => {
    if (layer.feature) map.removeLayer(layer);
  });

  const countryCount = {};

  // 🔥 ország darabszám
  banknotes.forEach(note => {
    if (!note.country) return;

    const c = normalizeToEnglish(note.country);
    countryCount[c] = (countryCount[c] || 0) + 1;
  });

  L.geoJSON(worldData, {

    // 🔥 SZÍNEZÉS
    style: function(feature) {

      const name = normalizeToEnglish(feature.properties.name);
      const count = countryCount[name] || 0;

      let fillColor = "transparent";

      if (count > 0 && count <= 5) fillColor = "#fff3b0";
      else if (count > 5 && count <= 20) fillColor = "#ffa94d";
      else if (count > 20) fillColor = "#ff8c00";

      return {
        color: "#cc3333",
        weight: 1,
        fillColor: fillColor,
        fillOpacity: count > 0 ? 0.8 : 0
      };
    },

    // 🔥 INTERAKCIÓ
    onEachFeature: function(feature, layer) {

      const name = normalizeToEnglish(feature.properties.name);
      const count = countryCount[name] || 0;

      if (count > 0) {
        layer.bindPopup(`${feature.properties.name}: ${count} db`);
      }

      layer.on({
        mouseover: e => e.target.setStyle({ weight: 3, color: "#ff4444" }),
        mouseout: e => e.target.setStyle({ weight: 1, color: "#cc3333" })
      });

      // 🔥 KATTINTÁS
      layer.on('click', function() {

        statsMode = "country";
        activeCountry = null;
        activeContinent = null;

        const mapName = normalizeToEnglish(feature.properties.name);

        banknotes = allBanknotes.filter(note => {
          if (!note.country) return false;

          const c = normalizeToEnglish(note.country);
          return c === mapName;
        });

        renderBanknotes();
      });
    }

  }).addTo(map);
}

    "norway":"Europe","sweden":"Europe","finland":"Europe","denmark":"Europe",
    "ireland":"Europe","iceland":"Europe",
    "united kingdom":"Europe","uk":"Europe",

    "china":"Asia","kina":"Asia",

    "indonesia":"Asia","thailand":"Asia","vietnam":"Asia",

    "usa":"America","united states":"America","united states of america":"America",

  };

  const countryHu = {

    "germany":"Németország",
    "austria":"Ausztria",
    "france":"Franciaország",
    "spain":"Spanyolország",
    "italy":"Olaszország",
    "china":"Kína",
    "japan":"Japán",
    "india":"India",
    "united states of america":"USA",
    "brazil":"Brazília",
    "argentina":"Argentína",
    "egypt":"Egyiptom",
    "south africa":"Dél-Afrika",
    "australia":"Ausztrália"
  };

  // 🌍 CONTINENT
  if (statsMode === "continent") {

    const counts = {};

    allBanknotes.forEach(note => {
      const c = normalizeToEnglish(note.country);
      const cont = continentMap[c] || "Other";
      counts[cont] = (counts[cont] || 0) + 1;
    });

    Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([continent, count]) => {

        const div = document.createElement("div");
        div.className = "stat-row";

        div.innerHTML = `
          <span>${iconMap[continent]}</span>
          <span>${count} db</span>
        `;

        div.onclick = () => {
          activeContinent = continent;
          statsMode = "continent-drill";

          banknotes = allBanknotes.filter(n =>
            (continentMap[normalizeToEnglish(n.country)] || "Other") === continent
          );

          renderBanknotes();
        };

        statsDiv.appendChild(div);
      });
  }

  // 🌎 CONTINENT → COUNTRY
  else if (statsMode === "continent-drill") {

    const counts = {};

    allBanknotes.forEach(note => {
      const c = normalizeToEnglish(note.country);
      const cont = continentMap[c] || "Other";

      if (cont !== activeContinent) return;

      counts[c] = (counts[c] || 0) + 1;
    });

    // 🔙 vissza
    const back = document.createElement("div");
    back.className = "stat-row";
    back.innerHTML = "⬅️ Vissza";

    back.onclick = () => {
      statsMode = "continent";
      activeContinent = null;
      banknotes = [...allBanknotes];
      activeCountry = null;
      renderBanknotes();
    };

    statsDiv.appendChild(back);

    Object.entries(counts)
      .sort((a,b)=>b[1]-a[1])
      .forEach(([country, count]) => {

        const name = countryHu[country] || country;

        const div = document.createElement("div");
        div.className = "stat-row";

        if (country === activeCountry) {
          div.classList.add("active-country");

          <span>

          <span>${count} db</span>

        div.onclick = () => {

          // 🔥 TOGGLE FIX
          if (activeCountry === country) {
            activeCountry = null;

            // vissza kontinensre
            banknotes = allBanknotes.filter(n =>
              (continentMap[normalizeToEnglish(n.country)] || "Other") === activeContinent
            );

          } else {
            activeCountry = country;

            banknotes = allBanknotes.filter(n =>
              normalizeToEnglish(n.country) === country
            );
          }

          renderBanknotes();
        };

        statsDiv.appendChild(div);
      });
  }

  // 🌎 COUNTRY MODE (csak kijelzett állapot)
  else {
    // ezt nem használjuk aktívan már
  }
}

// LOAD
async function loadBanknotes() {
  const snap = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  snap.forEach(docu => {
    const data = { id: docu.id, ...docu.data() };
    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}

// INIT
await loadWorldMap();  
initMap();
loadBanknotes();
