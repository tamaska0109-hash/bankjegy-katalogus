<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjteménye</title>

  <style>

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.top-bar input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.top-bar button {
  padding: 8px 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.add-box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  margin: 0 auto 30px auto;
}

.add-box input,
.add-box select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.add-box button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;

body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
}

/* ===== DESIGN UPGRADE ===== */

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: linear-gradient(145deg, #1a1a1a, #222);
  padding: 15px;
  width: 220px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px gold;
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin: 5px 0;
  font-size: 18px;
}

.card p {
  margin: 3px 0;
  font-size: 14px;
  color: #ccc;
}

.card button {
  margin-top: 10px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: crimson;
  color: white;
  cursor: pointer;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}

    #map {
  margin-bottom: 20px;
  border-radius: 10px;
  height: 600px;
  position: relative; /* 🔥 EZ FONTOS */
}


.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;

  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  padding: 12px;
  border-radius: 12px;

  font-size: 14px;
  color: white;

  border: 1px solid rgba(255, 255, 255, 0.2);

  box-shadow: 0 8px 20px rgba(0,0,0,0.4);

  z-index: 1000;
}

.legend div {
  display: flex;
  align-items: center;
  margin: 5px 0;
}

.legend span {
  display: inline-block;
  width: 25px;
  height: 12px;
  margin-right: 10px;
  border-radius: 4px;
}

.legend:hover {
  transform: scale(1.05);
  transition: 0.2s;
}   

#stats {
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
  background: #1a1a1a;
  padding: 5px 10px;
  border-radius: 5px;
}    
    
</style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
  </head>

  <body>

   <h1>💰 Tamás Bankjegy Gyűjteménye</h1>
   <div class="top-bar">
  <button onclick="adminLogin()">🔐 Admin belépés</button>
  <button onclick="logout()">🚪 Kilépés</button>
</div>
    
    <h2 id="totalValue">Összérték: 0 €</h2>

    <h2>🌍 Gyűjtemény térkép</h2>
<div id="map">

  <div class="legend">
    <div><span style="background:white"></span> 0 db</div>
    <div><span style="background:#a8e6cf"></span> 1–5 db</div>
    <div><span style="background:#56c596"></span> 6–20 db</div>
    <div><span style="background:#2e8b57"></span> 20+ db</div>
  </div>

</div>
    
    <h2>📊 Statisztika</h2>
<div id="stats"></div>
    
   <div class="top-bar">
  <input id="filterCountry" placeholder="Ország">
  <input id="filterYear" placeholder="Év">
  <input id="filterCatalog" placeholder="Katalógusszám">  
  <button onclick="applyFilter()">Szűrés</button>
  <button onclick="resetFilter()">Reset</button>
</div>

  <div class="add-box" id="addBox">
    
  <h2>➕ Új bankjegy</h2>

  <input id="nameInput" placeholder="Név">
  <input id="countryInput" placeholder="Ország">
  <input id="yearInput" placeholder="Év">
  <input id="catalogInput" placeholder="Katalógusszám (pl. P-123)">
  <select id="conditionInput">
    <option value="UNC">UNC</option>
    <option value="AU">AU</option>
    <option value="XF">XF</option>
    <option value="VF">VF</option>
  </select>
  <input id="valueInput" placeholder="Érték (€)">
  <button onclick="estimateValue()">🤖 AI becslés</button>  
  <input id="purchaseInput" placeholder="Beszerzési ár (€)">  
  <input id="imgInput" placeholder="Kép link">

  <button onclick="addBanknote()">Hozzáadás</button>
</div>

  <div class="container"></div>

   <script type="module">

     let isAdmin = false;

     let worldData = null;

async function loadWorldMap() {
  const res = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
  worldData = await res.json();
}

// 🔥 Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔑 SAJÁT CONFIG (EZ A TIÉD)
const firebaseConfig = {
  apiKey: "AIzaSyDupwhLiT13blp-UtOCy4A57337sQQuHLw",
  authDomain: "bankjegy-2c60b.firebaseapp.com",
  projectId: "bankjegy-2c60b",
  storageBucket: "bankjegy-2c60b.firebasestorage.app",
  messagingSenderId: "460307693292",
  appId: "1:460307693292:web:7960652c96dbdc1a9d2fc9"
};

// 🚀 Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let banknotes = [];
const container = document.querySelector(".container");

// 🔄 Megjelenítés
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
  <img src="${note.img || 'https://via.placeholder.com/150'}">
  <h3>${note.name || "Nincs név"}</h3>
  <p>${note.country || "Ismeretlen ország"} • ${note.year || "-"}</p>
  <p>Katalógus: ${note.catalog || "-"}</p>
  ${isAdmin ? `<p>💰 ${note.value || 0} €</p>` : ""}
  ${isAdmin ? `<p>Beszerzés: ${note.purchase || 0} €</p>` : ""}
  <p>Állapot: ${note.condition || "-"}</p>
  ${isAdmin ? `<button onclick="deleteNote('${note.id}')">Törlés</button>` : ""}
`;

    container.appendChild(div);
  });
  updateTotal();
  updateMap();
  updateStats();

  document.getElementById("addBox").style.display = isAdmin ? "block" : "none";
}

// ➕ Hozzáadás
window.addBanknote = async function () {
  const note = {
    name: document.getElementById("nameInput").value || "Ismeretlen",
    country: document.getElementById("countryInput").value,
    year: parseInt(document.getElementById("yearInput").value),
    catalog: document.getElementById("catalogInput").value,
    condition: document.getElementById("conditionInput").value,
    value: parseFloat(document.getElementById("valueInput").value),
    purchase: parseFloat(document.getElementById("purchaseInput").value),
    img: document.getElementById("imgInput").value
  };

  await addDoc(collection(db, "banknotes"), note);

  loadBanknotes();

if (localStorage.getItem("isAdmin") === "true") {
  isAdmin = true;
}
  
};

// 🗑️ Törlés
window.deleteNote = async function (id) {

  const confirmDelete = confirm("Biztosan törölni szeretnéd ezt a bankjegyet?");

  if (!confirmDelete) return;

  await deleteDoc(doc(db, "banknotes", id));
  loadBanknotes();
};

// 🚀 Indítás
let allBanknotes = [];

// 🔄 módosítjuk a loadBanknotes-t
async function loadBanknotes() {
  const querySnapshot = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  querySnapshot.forEach((docu) => {
    const data = {
      id: docu.id,
      ...docu.data()
    };

    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}   

// 🔍 Szűrés
window.applyFilter = function () {
  const country = document.getElementById("filterCountry").value.toLowerCase();
  const year = document.getElementById("filterYear").value;
  const catalog = document.getElementById("filterCatalog").value.toLowerCase();

  banknotes = allBanknotes.filter(note => {
    return (
      (!country || (note.country && note.country.toLowerCase().includes(country))) &&
      (!year || note.year == year) &&
      (!catalog || (note.catalog && note.catalog.toLowerCase().includes(catalog)))
    );
  });

  renderBanknotes();
};

// 🔄 Reset
window.resetFilter = function () {
  banknotes = [...allBanknotes];
  renderBanknotes();
};

if (localStorage.getItem("isAdmin") === "true") {
  isAdmin = true;
}

loadBanknotes();




 function getCountryDisplay(name) {
  if (!name) return { hu: "", flag: "🏳️" };

  const n = name.toLowerCase().trim();

  const data = countryData[n];

  const huName = data?.hu || n;
  const code = data?.code;

  let flag = "🏳️";

  if (code && code.length === 2) {
    flag = String.fromCodePoint(
      code.charCodeAt(0) + 127397,
      code.charCodeAt(1) + 127397
    );
  }

  return { hu: huName, flag: flag };
}
     
  function getFlagEmoji(countryName) {
  if (!countryName) return "🏳️";

  // alap ISO kódok (fontosabb országok)
  const codeMap = {
    "hungary": "HU",
    "germany": "DE",
    "france": "FR",
    "italy": "IT",
    "spain": "ES",
    "egypt": "EG",
    "japan": "JP",
    "china": "CN",
    "brazil": "BR",
    "argentina": "AR",
    "chile": "CL",
    "india": "IN",
    "australia": "AU",
    "canada": "CA",
    "united states of america": "US",
    "united kingdom": "GB"
  };

  const code = codeMap[countryName];

  if (!code) return "🏳️";

  return String.fromCodePoint(
    ...[...code].map(c => 127397 + c.charCodeAt())
  );
}


  function updateTotal() {

  if (!isAdmin) {
    document.getElementById("totalValue").innerText = "Összérték: 🔒";
    return;
  }

  let total = 0;

  banknotes.forEach(note => {
    total += Number(note.value) || 0;
  });

  document.getElementById("totalValue").innerText =
    "Összérték: " + total + " €";
}
let map;

  function updateStats() {
  const statsDiv = document.getElementById("stats");
  if (!statsDiv) return;

  const counts = {};

  banknotes.forEach(note => {
    if (!note.country) return;

    const c = normalizeCountry(note.country);
    counts[c] = (counts[c] || 0) + 1;
  });

  // rendezés
  const sorted = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10); // TOP 10

  statsDiv.innerHTML = "";

  sorted.forEach(([country, count]) => {
    const div = document.createElement("div");
    div.className = "stat-row";
    const display = getCountryDisplay(country);

div.innerHTML = `<span>${display.flag} ${display.hu}</span><span>${count} db</span>`;

div.style.cursor = "pointer";

div.onclick = function() {

  // 🔥 lista szűrés
  banknotes = allBanknotes.filter(note => {
    const mapped = normalizeCountry(note.country);
    return mapped === country;
  });

  renderBanknotes();

  map.eachLayer(layer => {
  if (layer.feature) {
    const name = layer.feature.properties.name.toLowerCase();
    if (name === country) {
      layer.setStyle({
        weight: 3,
        color: "#fff"
      });

      map.fitBounds(layer.getBounds());
    }
  }
});

};
    statsDiv.appendChild(div);
  });
}

function initMap() {
  map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

await loadWorldMap();
initMap();

  function updateMap() {
  if (!map || !worldData) return;

  // régi rétegek törlése (körök stb.)
  map.eachLayer(layer => {
    if (layer.options && layer.options.fillColor) {
      map.removeLayer(layer);
    }
  });

  const countryCount = {};

    const countryMap = {
  "Magyarország": "Hungary",
  "Ausztria": "Austria",
  "Németország": "Germany",
  "USA": "United States of America"
};
    
  // darabszám országonként
  banknotes.forEach(note => {
    if (!note.country) return;
    
    const mapped = normalizeCountry(note.country);
countryCount[mapped] = (countryCount[mapped] || 0) + 1;
  });

  // országok kirajzolása
  L.geoJSON(worldData, {
    style: function(feature) {
      
  const name = feature.properties.name
  .toLowerCase()
  .normalize("NFD")
  .replace(/[\u0300-\u036f]/g, "");
  let count = countryCount[name] || 0;

  let fillColor = "#transparent"; // alap

  if (count > 0 && count <= 5) {
  fillColor = "#fff3bf"; // világos arany
} else if (count > 5 && count <= 20) {
  fillColor = "#ffd43b"; // arany
} else if (count > 20) {
  fillColor = "#fab005"; // sötétebb arany
}

  return {
    color: "cc3333",
    weight: 1,
    fillColor: fillColor,
    fillOpacity: count > 0 ? 0.7 : 0
  };
},
    
    onEachFeature: function(feature, layer) {
  const name = feature.properties.name;
  const count = countryCount[name] || 0;

  if (count > 0) {
    const display = getCountryDisplay(name.toLowerCase());

layer.bindPopup(`${display.flag} ${display.hu}: ${count} db`);
  }

layer.on({
  mouseover: function(e) {
    const layer = e.target;
    layer.setStyle({
      weight: 3,
      color: "#ff4444"
    });
  },
  mouseout: function(e) {
    const layer = e.target;
    layer.setStyle({
      weight: 1,
      color: "#555"
    });
  }
});

layer.on('click', function() {

  const name = feature.properties.name
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");

  banknotes = allBanknotes.filter(note => {
    if (!note.country) return false;

    const mapped = normalizeCountry(note.country);
    return mapped === name;
  });

  renderBanknotes();
});

}
  }).addTo(map);
}

window.adminLogin = function() {
  const password = prompt("Add meg a jelszót:");

  if (password === "1234") {
    isAdmin = true;

    localStorage.setItem("isAdmin", "true"); // 🔥 EZ AZ ÚJ

    alert("Admin mód aktiválva");
    renderBanknotes();
  } else {
    alert("Hibás jelszó");
  }
};

 window.logout = function() {
  isAdmin = false;
  localStorage.removeItem("isAdmin");

  alert("Kijelentkeztél");
  renderBanknotes();
};  

window.estimateValue = function() {

  const country = document.getElementById("countryInput").value;
  const year = parseInt(document.getElementById("yearInput").value);
  const condition = document.getElementById("conditionInput").value;

  let base = 5;

const c = normalizeCountry(country);

// ország alapú szorzó (egyszerű, stabil)
if (c === "united states of america") base = 10;
else if (c === "hungary") base = 6;
else if (c === "germany") base = 8;

  // év (régebbi = drágább)
  let ageFactor = 1;
  if (year < 1950) ageFactor = 5;
  else if (year < 1980) ageFactor = 3;
  else if (year < 2000) ageFactor = 2;

  // állapot
  let conditionFactor = 1;

if (condition === "UNC") conditionFactor = 4;
else if (condition === "AU") conditionFactor = 3;
else if (condition === "XF") conditionFactor = 2.5;
else if (condition === "VF") conditionFactor = 2;
else if (condition === "F") conditionFactor = 1.5;
else if (condition === "VG") conditionFactor = 1.2;
else if (condition === "G") conditionFactor = 1;
  const estimated = base * ageFactor * conditionFactor;

  document.getElementById("valueInput").value = estimated.toFixed(2);

  alert("AI becslés kész 💰");
};     
     
</script>

 </body>
</html>
