<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjtemény</title>

  <style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
  </head>

  <body>

   <h1>💰 Tamás Bankjegy Gyűjtemény</h1>

    <div id="totalValue"></div>

   <div id="addForm">
  <input id="nameInput" placeholder="Név"><br>
  <input id="countryInput" placeholder="Ország"><br>
  <input id="yearInput" placeholder="Év"><br>
  <input id="valueInput" placeholder="Érték"><br>
  <input id="imgInput" placeholder="Kép link"><br>
  <button onclick="addBanknote()">Hozzáadás</button>
</div>

  <div class="container"></div>

   <script>

     const supabase = window.supabase.createClient(
  "https://fqhhzagiwdvbclcuhztmb.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxaGh6YWdpd2R2YmxjdWh6dG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDMwMjUsImV4cCI6MjA4OTY3OTAyNX0.w1MRyD-YRalYYu_PpPfSRvC0BbmhWkoYCgUBOvzsHOQ"
);

let banknotes = [];

     let banknotes = JSON.parse(localStorage.getItem("banknotes")) || [
  {
    name: "Teszt bankjegy",
    value: 100,
    img: "https://via.placeholder.com/150"
  }
];
     
const container = document.querySelector(".container");

function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${note.name}</h3>
      <img src="${note.img || 'https://via.placeholder.com/150'}">
      <p>${note.value} €</p>
    `;

    container.appendChild(div);
  });
}

   async function addBanknote() {
  const note = {
    name: document.getElementById("nameInput").value,
    country: document.getElementById("countryInput").value,
    year: parseInt(document.getElementById("yearInput").value),
    condition: "UNC",
    value: parseFloat(document.getElementById("valueInput").value),
    img: document.getElementById("imgInput").value
  };

  const { error } = await supabase
    .from("banknotes")
    .insert([note]);

  if (error) {
    console.error(error);
    alert("Hiba történt!");
    return;
  }

  loadBanknotes();
}  

 async function loadBanknotes() {
  const { data, error } = await supabase
    .from("banknotes")
    .select("*");

  if (error) {
    console.error(error);
    return;
  }

  banknotes = data || [];

  renderBanknotes();
}    

loadBanknotes();
     
</script>

 </body>
</html>
