<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Tamás Gyűjtemény</title>
  <style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

#search {
  padding: 10px;
  width: 300px;
  margin: 20px;
  border-radius: 5px;
  border: none;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 15px;
  width: 250px;
  border-radius: 10px;
}

img {
  width: 100%;
  border-radius: 5px;
}
#collectionValueBox {
  background: #222;
  color: #0f0;
  padding: 15px;
  margin: 20px;
  font-size: 22px;
  border-radius: 10px;
}    
</style>
</head>
<body>


<h1>💰 Tamás Bankjegy Gyűjtemény</h1>
<div id="collectionValueBox">
  Teljes gyűjtemény értéke: <span id="totalValue">0</span> €
</div>
<input type="text" id="search" placeholder="Keresés (pl. Forint, Dollar...)">

<div class="container"></div>
<script>

const banknotes = [
  {
    name: "100 Forint",
    country: "Hungary",
    condition: "UNC",
    baseValue: 5000,
    img: "IDE_A_LINKED"
  },
  {
    name: "1 Dollar",
    country: "USA",
    condition: "XF",
    baseValue: 10,
    img: "https://via.placeholder.com/300x150"
  },
  {
    name: "1 Korona",
    country: "Austria",
    condition: "UNC",
    baseValue: 20,
    img: "https://pub-a2501e448e5b4181b6769dfb2e007129.r2.dev/bankjegyek/1_Korona_e..jpg"
  }
];

const searchInput = document.getElementById("search");
const container = document.querySelector(".container");
  
function calculateValue(note) {
  let multiplier = 1;

  if (note.condition === "UNC") multiplier = 3;
  else if (note.condition === "XF") multiplier = 2;
  else if (note.condition === "VF") multiplier = 1.5;

  return note.baseValue * multiplier;
}
  
function updateCollectionValue() {
  let total = 0;

  banknotes.forEach(note => {
    total += calculateValue(note);
  });

  document.getElementById("totalValue").innerText = total;
} 
  
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h2>${note.name}</h2>
      <img src="${note.img}">
      <p>Ország: ${note.country}</p>
      <p>Állapot: ${note.condition}</p>
      <p>Érték: ${calculateValue(note)} €</p>
    `;

    container.appendChild(card);
  });
}

searchInput.addEventListener("keyup", function() {
  const value = this.value.toLowerCase();
  const cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(value)
      ? "block"
      : "none";
  });
});

document.addEventListener("DOMContentLoaded", function() {
  renderBanknotes();
  updateCollectionValue();
});
</script>
</body>
</html>
