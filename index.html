<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjteménye</title>

  <style>

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.top-bar input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.top-bar button {
  padding: 8px 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.add-box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  margin: 0 auto 30px auto;
}

.add-box input,
.add-box select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.add-box button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;
}
    
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
}

/* ===== DESIGN UPGRADE ===== */

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: linear-gradient(145deg, #1a1a1a, #222);
  padding: 15px;
  width: 220px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px gold;
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin: 5px 0;
  font-size: 18px;
}

.card p {
  margin: 3px 0;
  font-size: 14px;
  color: #ccc;
}

.card button {
  margin-top: 10px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: crimson;
  color: white;
  cursor: pointer;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}

    #map {
  margin-bottom: 20px;
  border-radius: 10px;
  height: 600px;
  position: relative; /* 🔥 EZ FONTOS */
}


.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;

  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  padding: 12px;
  border-radius: 12px;

  font-size: 14px;
  color: white;

  border: 1px solid rgba(255, 255, 255, 0.2);

  box-shadow: 0 8px 20px rgba(0,0,0,0.4);

  z-index: 1000;
}

.legend div {
  display: flex;
  align-items: center;
  margin: 5px 0;
}

.legend span {
  display: inline-block;
  width: 25px;
  height: 12px;
  margin-right: 10px;
  border-radius: 4px;
}

.legend:hover {
  transform: scale(1.05);
  transition: 0.2s;
}   

#stats {
  max-width: 400px;
  margin: 20px auto;
  text-align: left;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  margin: 5px 0;
  background: #1a1a1a;
  padding: 5px 10px;
  border-radius: 5px;
}    

.stat-row {
  cursor: pointer;
  transition: 0.2s;
}

.stat-row:hover {
  transform: scale(1.05);
  background: rgba(255, 215, 0, 0.1);
  box-shadow: 0 0 10px gold;
}

.active-continent {
  background: gold !important;
  color: black;
  font-weight: bold;
}

.active-country {
  background: #ff4d4d;
  color: white;
  font-weight: bold;
}
    
 @keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.stat-row.clicked {
  animation: pulse 0.3s ease;
}  

 .legend div {
  cursor: pointer;
  transition: 0.2s;
}

.legend div:hover {
  transform: scale(1.05);
  background: rgba(255, 0, 0, 0.15); /* halvány piros */
}

.active-legend {
  background: #ff4d4d !important; /* erős piros */
  color: white;
  font-weight: bold;
}   
    
</style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
  </head>

  <body>

   <h1>💰 Tamás Bankjegy Gyűjteménye</h1>
   <div class="top-bar">
  <button onclick="adminLogin()">🔐 Admin belépés</button>
  <button onclick="logout()">🚪 Kilépés</button>
</div>
    
    <h2 id="totalValue">Összérték: 0 €</h2>

    <h2>🌍 Gyűjtemény térkép</h2>
<div id="map">

  <div class="legend">
  <div onclick="filterByRange('0')">
    <span style="background:#ffffff"></span> 0 db
  </div>

  <div onclick="filterByRange('1-5')">
    <span style="background:#fff3b0"></span> 1–5 db
  </div>

  <div onclick="filterByRange('6-20')">
    <span style="background:#ffa94d"></span> 6–20 db
  </div>

  <div onclick="filterByRange('20+')">
    <span style="background:#ff8c00"></span> 20+ db
  </div>
</div>

</div>
    
    <h2>📊 Statisztika</h2>
<div id="stats"></div>
    
   <div class="top-bar">
  <input id="filterCountry" placeholder="Ország">
  <input id="filterYear" placeholder="Év">
  <input id="filterCatalog" placeholder="Katalógusszám">  
  <button onclick="applyFilter()">Szűrés</button>
  <button onclick="resetFilter()">Reset</button>
</div>

  <div class="add-box" id="addBox">
    
  <h2>➕ Új bankjegy</h2>

  <input id="nameInput" placeholder="Név">
  <input id="countryInput" placeholder="Ország">
  <input id="yearInput" placeholder="Év">
  <input id="catalogInput" placeholder="Katalógusszám (pl. P-123)">
  <select id="conditionInput">
    <option value="UNC">UNC</option>
    <option value="AU">AU</option>
    <option value="XF">XF</option>
    <option value="VF">VF</option>
  </select>
  <input id="valueInput" placeholder="Érték (€)">
  <button onclick="estimateValue()">🤖 AI becslés</button>  
  <input id="purchaseInput" placeholder="Beszerzési ár (€)">  
  <input id="imgInput" placeholder="Kép link">

  <button onclick="addBanknote()">Hozzáadás</button>
</div>

  <div class="container"></div>

<script type="module">

let isAdmin = false;
let worldData = null;
let map;
let banknotes = [];
let allBanknotes = [];

let activeContinent = null;
let activeLegend = null;
let statsMode = "continent"; // 🔥 FIX
let activeCountry = null;

// ADMIN
if (localStorage.getItem("isAdmin") === "true") {
  isAdmin = true;
}

// NORMALIZE
function normalizeCountry(name) {
  if (!name) return "";
  return name.toLowerCase().trim()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "");
}

// TO ENGLISH
function normalizeToEnglish(name) {
  const map = {
    "magyarorszag":"hungary",
    "nemetorszag":"germany",
    "ausztria":"austria",
    "kina":"china",
    "usa":"united states of america",
    "egyesult allamok":"united states of america"
  };
  const n = normalizeCountry(name);
  return map[n] || n;
}

// 🌍 CONTINENT MAP (A TE FULL LISTÁD – megtartva)
window.continentMap = { ... }; // 👉 EZ MARAD A TIÉD, NEM VÁLTOZTATTAM

// FLAG (A TE VERZIÓD – marad)
function getFlagCode(name) {
  const n = normalizeCountry(name);
  const map = { /* marad a teljes verziód */ };
  return map[n] || "";
}

// FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDupwhLiT13blp-UtOCy4A57337sQQuHLw",
  authDomain: "bankjegy-2c60b.firebaseapp.com",
  projectId: "bankjegy-2c60b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.querySelector(".container");

// MAP LOAD
async function loadWorldMap() {
  const res = await fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json");
  worldData = await res.json();
}

// MAP INIT
function initMap() {
  map = L.map('map').setView([20, 0], 2);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

// RENDER
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${note.img || ''}">
      <h3>${note.name || ""}</h3>
      <p>${note.country || ""}</p>
      <p>${note.year || ""}</p>
    `;

    container.appendChild(div);
  });

  updateMap();
  updateStats();
}

// MAP UPDATE (🔥 JAVÍTVA)
function updateMap() {
  if (!map || !worldData) return;

  map.eachLayer(layer => {
    if (layer.feature) map.removeLayer(layer);
  });

  const counts = {};

  allBanknotes.forEach(note => {
    const c = normalizeToEnglish(note.country);
    counts[c] = (counts[c] || 0) + 1;
  });

  L.geoJSON(worldData, {

    style: function(feature) {

      const name = normalizeToEnglish(feature.properties.name);
      const count = counts[name] || 0;

      let fillColor = "transparent";

      if (count > 0 && count <= 5) fillColor = "#fff3b0";
      else if (count > 5 && count <= 20) fillColor = "#ffa94d";
      else if (count > 20) fillColor = "#ff8c00";

      // 🌍 kontinens halványítás
      if (activeContinent) {
        const cont = continentMap[name] || "Other";
        if (cont !== activeContinent) {
          return { color:"#333", fillColor:"#111", fillOpacity:0.1 };
        }
      }

      // 🔥 ország highlight
      if (activeCountry === name) {
        return { color:"red", weight:3, fillColor:fillColor, fillOpacity:1 };
      }

      return {
        color:"#cc3333",
        weight:1,
        fillColor:fillColor,
        fillOpacity:count ? 0.8 : 0
      };
    },

    onEachFeature: function(feature, layer) {

      const name = normalizeToEnglish(feature.properties.name);

      layer.on('click', function() {

        activeCountry = name;
        activeContinent = continentMap[name] || null;
        statsMode = "continent-drill";

        banknotes = allBanknotes.filter(n =>
          normalizeToEnglish(n.country) === name
        );

        renderBanknotes();
      });
    }

  }).addTo(map);
}

// STATS (🔥 JAVÍTVA)
function updateStats() {

  const statsDiv = document.getElementById("stats");
  statsDiv.innerHTML = "";

  const iconMap = {
    "Europe":"🌍 Európa",
    "Asia":"🌏 Ázsia",
    "America":"🌎 Amerika",
    "Africa":"🌍 Afrika",
    "Oceania":"🌏 Óceánia",
    "Other":"❓ Egyéb"
  };

  if (statsMode === "continent") {

    const counts = {};

    allBanknotes.forEach(n => {
      const c = normalizeToEnglish(n.country);
      const cont = continentMap[c] || "Other";
      counts[cont] = (counts[cont] || 0) + 1;
    });

    Object.entries(counts).forEach(([cont, count]) => {

      const div = document.createElement("div");
      div.className = "stat-row";
      div.innerHTML = `<span>${iconMap[cont]}</span><span>${count} db</span>`;

      div.onclick = () => {
        activeContinent = cont;
        statsMode = "continent-drill";
        activeCountry = null;

        banknotes = allBanknotes.filter(n =>
          (continentMap[normalizeToEnglish(n.country)] || "Other") === cont
        );

        renderBanknotes();
      };

      statsDiv.appendChild(div);
    });

  } else {

    const counts = {};

    allBanknotes.forEach(n => {
      const c = normalizeToEnglish(n.country);
      if ((continentMap[c] || "Other") !== activeContinent) return;
      counts[c] = (counts[c] || 0) + 1;
    });

    const back = document.createElement("div");
    back.className = "stat-row";
    back.innerHTML = "⬅️ Vissza";

    back.onclick = () => {
      statsMode = "continent";
      activeContinent = null;
      activeCountry = null;
      banknotes = [...allBanknotes];
      renderBanknotes();
    };

    statsDiv.appendChild(back);

    Object.entries(counts).forEach(([country, count]) => {

      const div = document.createElement("div");
      div.className = "stat-row";

      div.innerHTML = `
        <span>
          <img src="https://flagcdn.com/24x18/${getFlagCode(country)}.png"
          style="width:24px; margin-right:6px;">
          ${country}
        </span>
        <span>${count} db</span>
      `;

      div.onclick = () => {

        activeCountry = country;

        banknotes = allBanknotes.filter(n =>
          normalizeToEnglish(n.country) === country
        );

        renderBanknotes();
      };

      statsDiv.appendChild(div);
    });
  }
}

// LOAD
async function loadBanknotes() {
  const snap = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  snap.forEach(docu => {
    const data = { id: docu.id, ...docu.data() };
    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}

// INIT
await loadWorldMap();
initMap();
loadBanknotes();

</script>

 </body>
</html>
