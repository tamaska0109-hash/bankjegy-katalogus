<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjtemény</title>

  <style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
  </head>

  <body>

   <h1>💰 Tamás Bankjegy Gyűjteménye</h1>

    <div id="totalValue"></div>

   <div id="addForm">
     <hr>

<input id="filterCountry" placeholder="Szűrés országra">
<input id="filterYear" placeholder="Szűrés évre">
<button onclick="applyFilter()">Szűrés</button>
<button onclick="resetFilter()">Reset</button>
     
     
  <input id="nameInput" placeholder="Név"><br>
  <input id="countryInput" placeholder="Ország"><br>
  <input id="yearInput" placeholder="Év"><br>

<select id="conditionInput">
  <option value="UNC">UNC (Uncirculated)</option>
  <option value="AU">AU (About Uncirculated)</option>
  <option value="XF">XF (Extremely Fine)</option>
  <option value="VF">VF (Very Fine)</option>
  <option value="F">Fine</option>
  <option value="VG">Very Good</option>
  <option value="G">Good</option>
</select><br>
     
  <input id="valueInput" placeholder="Érték"><br>
  <input id="imgInput" placeholder="Kép link"><br>
  <button onclick="addBanknote()">Hozzáadás</button>
</div>

  <div class="container"></div>

   <script type="module">

// 🔥 Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔑 SAJÁT CONFIG (EZ A TIÉD)
const firebaseConfig = {
  apiKey: "AIzaSyDupwhLiT13blp-UtOCy4A57337sQQuHLw",
  authDomain: "bankjegy-2c60b.firebaseapp.com",
  projectId: "bankjegy-2c60b",
  storageBucket: "bankjegy-2c60b.firebasestorage.app",
  messagingSenderId: "460307693292",
  appId: "1:460307693292:web:7960652c96dbdc1a9d2fc9"
};

// 🚀 Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let banknotes = [];
const container = document.querySelector(".container");

// 🔄 Megjelenítés
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${note.name}</h3>
      <img src="${note.img || 'https://via.placeholder.com/150'}">
      <p>${note.value} €</p>
      <p>Állapot: ${note.condition}</p>
      <button onclick="deleteNote('${note.id}')">❌</button>
    `;

    container.appendChild(div);
  });
}

// ➕ Hozzáadás
window.addBanknote = async function () {
  const note = {
    name: document.getElementById("nameInput").value,
    country: document.getElementById("countryInput").value,
    year: parseInt(document.getElementById("yearInput").value),
   condition: document.getElementById("conditionInput").value,
    value: parseFloat(document.getElementById("valueInput").value),
    img: document.getElementById("imgInput").value
  };

  await addDoc(collection(db, "banknotes"), note);

  loadBanknotes();
};

// 🗑️ Törlés
window.deleteNote = async function (id) {
  await deleteDoc(doc(db, "banknotes", id));
  loadBanknotes();
};

// 🚀 Indítás
let allBanknotes = [];

// 🔄 módosítjuk a loadBanknotes-t
async function loadBanknotes() {
  const querySnapshot = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  querySnapshot.forEach((docu) => {
    const data = {
      id: docu.id,
      ...docu.data()
    };

    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}

// 🔍 Szűrés
window.applyFilter = function () {
  const country = document.getElementById("filterCountry").value.toLowerCase();
  const year = document.getElementById("filterYear").value;

  banknotes = allBanknotes.filter(note => {
    return (
      (!country || note.country.toLowerCase().includes(country)) &&
      (!year || note.year == year)
    );
  });

  renderBanknotes();
};

// 🔄 Reset
window.resetFilter = function () {
  banknotes = [...allBanknotes];
  renderBanknotes();
};

loadBanknotes();
     
</script>

 </body>
</html>
:::
