<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjtemény</title>

  <style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
}
</style>

  </head>

  <body>

   <h1>💰 Tamás Bankjegy Gyűjtemény</h1>

    <div id="totalValue"></div>

   <div id="addForm">
  <input id="nameInput" placeholder="Név"><br>
  <input id="countryInput" placeholder="Ország"><br>
  <input id="yearInput" placeholder="Év"><br>
  <input id="valueInput" placeholder="Érték"><br>
  <input id="imgInput" placeholder="Kép link"><br>
  <button onclick="addBanknote()">Hozzáadás</button>
</div>

  <div class="container"></div>

   <script>

let banknotes = [];

const container = document.querySelector(".container");

function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${note.name}</h3>
      <img src="${note.img || 'https://via.placeholder.com/150'}">
      <p>${note.value} €</p>
    `;

    container.appendChild(div);
  });
}

function addBanknote() {
  const note = {
    name: document.getElementById("nameInput").value,
    country: document.getElementById("countryInput").value,
    year: document.getElementById("yearInput").value,
    value: document.getElementById("valueInput").value,
    img: document.getElementById("imgInput").value
  };

  banknotes.push(note);

  renderBanknotes();
}

renderBanknotes();
     
</script>

 </body>
</html>
:::
