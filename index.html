<!DOCTYPE html>

<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Tamás Gyűjtemény</title>

  <style>

.top-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}

.top-bar input {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.top-bar button {
  padding: 8px 12px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.add-box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  margin: 0 auto 30px auto;
}

.add-box input,
.add-box select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

.add-box button {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;
}
    
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #222;
  padding: 15px;
  margin: 10px;
  width: 200px;
  border-radius: 10px;
}

img {
  width: 100%;
}

/* ===== DESIGN UPGRADE ===== */

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: linear-gradient(145deg, #1a1a1a, #222);
  padding: 15px;
  width: 220px;
  border-radius: 15px;
  transition: 0.3s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px gold;
}

.card img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card h3 {
  margin: 5px 0;
  font-size: 18px;
}

.card p {
  margin: 3px 0;
  font-size: 14px;
  color: #ccc;
}

.card button {
  margin-top: 10px;
  padding: 6px;
  border: none;
  border-radius: 6px;
  background: crimson;
  color: white;
  cursor: pointer;
}

h1 {
  color: gold;
  text-shadow: 0 0 10px gold;
}
    
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  
  </head>

  <body>

   <h1>💰 Tamás Bankjegy Gyűjteménye</h1>

    <div id="totalValue"></div>

   <div class="top-bar">
  <input id="filterCountry" placeholder="Ország">
  <input id="filterYear" placeholder="Év">
  <button onclick="applyFilter()">Szűrés</button>
  <button onclick="resetFilter()">Reset</button>
</div>

<div class="add-box">
  <h2>➕ Új bankjegy</h2>

  <input id="nameInput" placeholder="Név">
  <input id="countryInput" placeholder="Ország">
  <input id="yearInput" placeholder="Év">
  <select id="conditionInput">
    <option value="UNC">UNC</option>
    <option value="AU">AU</option>
    <option value="XF">XF</option>
    <option value="VF">VF</option>
  </select>
  <input id="valueInput" placeholder="Érték (€)">
  <input id="imgInput" placeholder="Kép link">

  <button onclick="addBanknote()">Hozzáadás</button>
</div>

  <div class="container"></div>

   <script type="module">

// 🔥 Firebase import
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔑 SAJÁT CONFIG (EZ A TIÉD)
const firebaseConfig = {
  apiKey: "AIzaSyDupwhLiT13blp-UtOCy4A57337sQQuHLw",
  authDomain: "bankjegy-2c60b.firebaseapp.com",
  projectId: "bankjegy-2c60b",
  storageBucket: "bankjegy-2c60b.firebasestorage.app",
  messagingSenderId: "460307693292",
  appId: "1:460307693292:web:7960652c96dbdc1a9d2fc9"
};

// 🚀 Init
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let banknotes = [];
const container = document.querySelector(".container");

// 🔄 Megjelenítés
function renderBanknotes() {
  container.innerHTML = "";

  banknotes.forEach(note => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
  <img src="${note.img || 'https://via.placeholder.com/150'}">
  <h3>${note.name || "Nincs név"}</h3>
  <p>${note.country || "Ismeretlen ország"} • ${note.year || "-"}</p>
  <p>💰 ${note.value || 0} €</p>
  <p>Állapot: ${note.condition || "-"}</p>
  <button onclick="deleteNote('${note.id}')">Törlés</button>
`;

    container.appendChild(div);
  });
}

// ➕ Hozzáadás
window.addBanknote = async function () {
  const note = {
    name: document.getElementById("nameInput").value || "Ismeretlen",
    country: document.getElementById("countryInput").value,
    year: parseInt(document.getElementById("yearInput").value),
   condition: document.getElementById("conditionInput").value,
    value: parseFloat(document.getElementById("valueInput").value),
    img: document.getElementById("imgInput").value
  };

  await addDoc(collection(db, "banknotes"), note);

  loadBanknotes();
};

// 🗑️ Törlés
window.deleteNote = async function (id) {
  await deleteDoc(doc(db, "banknotes", id));
  loadBanknotes();
};

// 🚀 Indítás
let allBanknotes = [];

// 🔄 módosítjuk a loadBanknotes-t
async function loadBanknotes() {
  const querySnapshot = await getDocs(collection(db, "banknotes"));

  banknotes = [];
  allBanknotes = [];

  querySnapshot.forEach((docu) => {
    const data = {
      id: docu.id,
      ...docu.data()
    };

    banknotes.push(data);
    allBanknotes.push(data);
  });

  renderBanknotes();
}

// 🔍 Szűrés
window.applyFilter = function () {
  const country = document.getElementById("filterCountry").value.toLowerCase();
  const year = document.getElementById("filterYear").value;

  banknotes = allBanknotes.filter(note => {
    return (
      (!country || note.country.toLowerCase().includes(country)) &&
      (!year || note.year == year)
    );
  });

  renderBanknotes();
};

// 🔄 Reset
window.resetFilter = function () {
  banknotes = [...allBanknotes];
  renderBanknotes();
};

loadBanknotes();
     
</script>

 </body>
</html>
:::
